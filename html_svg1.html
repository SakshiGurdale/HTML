<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
    margin:0;
    padding:0;
}

body{
    height:100vh;
    overflow:hidden;
    background:#FFFDF9;
}

svg{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-1;
}
</style>
</head>
<body>

<svg viewBox="0 0 1440 900" preserveAspectRatio="none">

    <defs>

        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFDF9"/>
            <stop offset="50%" stop-color="#FFF4EE"/>
            <stop offset="100%" stop-color="#F8F5F2"/>
        </linearGradient>

        <linearGradient id="wave1">
            <stop offset="0%" stop-color="#FFD8C7" stop-opacity="0.6"/>
            <stop offset="100%" stop-color="#F8D7DA" stop-opacity="0.4"/>
        </linearGradient>

        <linearGradient id="wave2">
            <stop offset="0%" stop-color="#D6EFD8" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#E8DFF5" stop-opacity="0.4"/>
        </linearGradient>

        <filter id="blur">
            <feGaussianBlur stdDeviation="40"/>
        </filter>

    </defs>

    <rect width="100%" height="100%" fill="url(#bg)"/>

    <!-- First Wave -->
    <path fill="url(#wave1)" filter="url(#blur)">
        <animate attributeName="d"
            dur="12s"
            repeatCount="indefinite"
            values="
            M0,650 C350,500 700,800 1440,620 L1440,900 L0,900 Z;
            M0,600 C400,800 900,450 1440,700 L1440,900 L0,900 Z;
            M0,650 C350,500 700,800 1440,620 L1440,900 L0,900 Z"/>
    </path>

    <!-- Second Wave -->
    <path fill="url(#wave2)" filter="url(#blur)">
        <animate attributeName="d"
            dur="16s"
            repeatCount="indefinite"
            values="
            M0,450 C450,650 900,250 1440,500 L1440,900 L0,900 Z;
            M0,520 C300,250 950,700 1440,400 L1440,900 L0,900 Z;
            M0,450 C450,650 900,250 1440,500 L1440,900 L0,900 Z"/>
    </path>

</svg>

</body>
</html>
